    <main>
        <h1>Worksheets</h1>
        <p>Practice with our interactive worksheets!</p>

        <div id="worksheets-container" class="grid">
            <!-- Worksheets will be loaded here dynamically -->
        </div>

        <div id="worksheet-form" style="display: none;">
            <form id="worksheet-form-element">
                <div id="worksheet-questions">
                    <!-- Worksheet questions will be loaded here -->
                </div>
                <button type="submit" class="btn">Submit Worksheet</button>
            </form>
        </div>

        <div id="worksheet-result" style="display: none;">
            <h2>Your Score: <span id="worksheet-score"></span></h2>
            <p id="worksheet-message"></p>
            <button id="back-to-worksheets" class="btn">Back to Worksheets</button>
        </div>
    </main>
