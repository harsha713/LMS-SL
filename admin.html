<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saaradaa Learknowations Pvt. Ltd. - Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">Saaradaa Learknowations Pvt. Ltd.</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="grades.html">Grades</a></li>
                <li><a href="worksheets.html">Worksheets</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="parent_child.html">Parent-Child</a></li>
                <!-- <li><a href="admin.html">Admin</a></li> -->
            </ul>
        </nav>
    </header>

    <main>
        <h1>Admin Panel</h1>
        <p>Manage content for the website.</p>

        <div class="card">
            <h3>Upload Company Logo</h3>
            <form>
                <input type="file" accept="image/*" required>
                <button type="submit" class="btn">Upload Logo</button>
            </form>
        </div>

        <div class="card">
            <h3>Upload Worksheet</h3>
            <form>
                <input type="text" placeholder="Worksheet Title" required>
                <input type="text" placeholder="Subject" required>
                <textarea placeholder="Questions (JSON format)" rows="5" required></textarea>
                <button type="submit" class="btn">Upload Worksheet</button>
            </form>
        </div>

        <div class="card">
            <h3>Book of the Month</h3>
            <form>
                <input type="text" placeholder="Book Title" required>
                <textarea placeholder="Summary" rows="3" required></textarea>
                <textarea placeholder="What You Learn" rows="3" required></textarea>
                <input type="file" accept="image/*" required>
                <button type="submit" class="btn">Set Book of the Month</button>
            </form>
        </div>

        <div class="card">
            <h3>Story Content</h3>
            <form>
                <input type="text" placeholder="Story Title" required>
                <textarea placeholder="Story Text" rows="5" required></textarea>
                <textarea placeholder="Moral" rows="2" required></textarea>
                <textarea placeholder="Discussion Questions" rows="3" required></textarea>
                <button type="submit" class="btn">Update Story</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; Saaradaa Learknowations Pvt. Ltd.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
